# Render Blueprint — one-click deploy
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: dailyai-news
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HF_API_TOKEN
        sync: false  # You'll be prompted to enter this during deploy
      - key: PYTHON_VERSION
        value: 3.11.12
